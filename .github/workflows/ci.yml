name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  interop:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ts-client/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/cache@v5
        with:
          path: |
            .dev-tools
            .dev-rust
            /tmp/temporal-sdk-rust-0.1.0
          key: harness-tools-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'ts-client/package-lock.json', 'pins/versions.env') }}
          restore-keys: |
            harness-tools-${{ runner.os }}-
      - uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run interop harness
        run: |
          started_at=$(date +%s)
          cargo run -p interop-harness -- test
          elapsed=$(( $(date +%s) - started_at ))
          {
            echo "### Interop harness timing"
            echo
            echo "- Total \`cargo run -p interop-harness -- test\`: ${elapsed}s"
            echo
            if [ -f .dev-logs/timing-summary.md ]; then
              cat .dev-logs/timing-summary.md
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Print logs
        if: failure()
        run: |
          if [ -d .dev-logs ]; then
            for log in .dev-logs/*.log; do
              echo "::group::$(basename "$log")"
              sed -n '1,240p' "$log"
              echo "::endgroup::"
            done
          fi
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: dev-logs
          path: .dev-logs
          include-hidden-files: true
          if-no-files-found: ignore
